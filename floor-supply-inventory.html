<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floor Supply Inventory</title>
<style>
  :root{
    --bg:#F1F4F7; --surface:#FFFFFF; --surface-2:#F8FAFC;
    --ink:#172033; --muted:#69748A; --faint:#98A2B3;
    --line:#E3E8EF; --line-strong:#D4DBE5;
    --primary:#0F766E; --primary-ink:#0B5852; --primary-soft:#E4F2F0;
    --expired:#B42318; --expired-soft:#FEE4E2;
    --soon:#B54708; --soon-soft:#FEF0C7;
    --watch:#9A6700; --watch-soft:#FCF3D6;
    --ok:#067647; --ok-soft:#DCFAE6;
    --flag:#5925DC; --flag-soft:#ECE9FE;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
    --shadow-lg:0 12px 32px rgba(16,24,40,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---- top bar ---- */
  header.app{
    position:sticky; top:0; z-index:30; background:var(--surface);
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:1240px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:14px}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--primary);
    display:grid;place-items:center;color:#fff;flex:none}
  .mark svg{width:19px;height:19px}
  .titles h1{font-size:16px;font-weight:650;margin:0;letter-spacing:-.01em}
  .titles p{margin:1px 0 0;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
  .bar .spacer{flex:1}
  .btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
    padding:8px 13px;border-radius:9px;font-weight:550;font-size:13px;display:inline-flex;
    align-items:center;gap:7px;transition:.12s;white-space:nowrap}
  .btn:hover{border-color:var(--faint);background:var(--surface-2)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn.primary:hover{background:var(--primary-ink)}
  .btn.ghost{border-color:transparent;color:var(--muted);padding:8px 10px}
  .btn.ghost:hover{background:var(--surface-2);color:var(--ink)}

  main{max-width:1240px;margin:0 auto;padding:22px 24px 80px}

  /* ---- stat cards ---- */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .stat .val{font-size:26px;font-weight:680;margin-top:6px;letter-spacing:-.02em}
  .stat .sub{font-size:11.5px;color:var(--faint);margin-top:2px}
  .stat .edge{position:absolute;left:0;top:0;bottom:0;width:4px}
  .stat.clk{cursor:pointer}
  .stat.clk:hover{border-color:var(--line-strong);box-shadow:var(--shadow-lg)}
  .stat.active{outline:2px solid var(--primary);outline-offset:-1px}

  /* ---- reminder panel ---- */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .panel .ph{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none}
  .panel .ph .ic{width:30px;height:30px;border-radius:8px;background:var(--soon-soft);color:var(--soon);
    display:grid;place-items:center;flex:none}
  .panel .ph .ic svg{width:16px;height:16px}
  .panel .ph h3{margin:0;font-size:14px;font-weight:620}
  .panel .ph p{margin:1px 0 0;font-size:12px;color:var(--muted)}
  .panel .ph .chev{margin-left:auto;color:var(--faint);transition:.18s}
  .panel.open .chev{transform:rotate(180deg)}
  .panel .pb{display:none;border-top:1px solid var(--line);padding:16px}
  .panel.open .pb{display:block}
  .rgrid{display:grid;grid-template-columns:170px 1fr;gap:18px}
  @media(max-width:760px){.rgrid{grid-template-columns:1fr}}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--line-strong);
    border-radius:8px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);
    box-shadow:0 0 0 3px var(--primary-soft)}
  .field+.field{margin-top:12px}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin-top:12px;cursor:pointer}
  .chk input{width:15px;height:15px;accent-color:var(--primary)}
  .msgbox textarea{width:100%;min-height:190px;resize:vertical;border:1px solid var(--line-strong);
    border-radius:9px;padding:11px 13px;background:var(--surface-2);color:var(--ink);
    line-height:1.5;font-size:13px}
  .msgrow{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
  .empty-note{color:var(--muted);font-size:13px;padding:14px;background:var(--surface-2);
    border:1px dashed var(--line-strong);border-radius:9px}

  /* ---- toolbar ---- */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .search{position:relative;flex:1;min-width:220px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
  .search input{width:100%;padding:9px 11px 9px 34px;border:1px solid var(--line-strong);
    border-radius:9px;background:var(--surface)}
  .search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  select.sel{padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);
    padding:7px 12px;border-radius:20px;font-size:12.5px;font-weight:560;display:inline-flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--faint)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip .cnt{font-variant-numeric:tabular-nums;opacity:.7;font-size:11px}
  .chip.on .cnt{opacity:.85}

  /* ---- table ---- */
  .tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);font-weight:650;padding:11px 14px;border-bottom:1px solid var(--line);
    background:var(--surface-2);position:sticky;top:63px;z-index:5;white-space:nowrap;cursor:pointer;user-select:none}
  thead th.no-sort{cursor:default}
  thead th .arr{opacity:.4;font-size:10px;margin-left:3px}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:.1s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr{position:relative}
  td.acc{padding-left:14px;border-left:3px solid transparent}
  .pname{font-weight:560;color:var(--ink);max-width:420px}
  .pcode{font-size:11.5px;color:var(--faint);font-variant-numeric:tabular-nums;margin-top:1px}
  .loc{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);white-space:nowrap}
  .loc .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);flex:none}
  .stockcell{font-variant-numeric:tabular-nums;font-weight:600}
  .stockcell .u{font-weight:400;color:var(--faint);font-size:12px;margin-left:3px}
  .stockcell.zero{color:var(--expired)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:7px;
    font-size:12px;font-weight:600;white-space:nowrap}
  .badge .d{width:7px;height:7px;border-radius:50%}
  .b-expired{background:var(--expired-soft);color:var(--expired)} .b-expired .d{background:var(--expired)}
  .b-soon{background:var(--soon-soft);color:var(--soon)} .b-soon .d{background:var(--soon)}
  .b-watch{background:var(--watch-soft);color:var(--watch)} .b-watch .d{background:var(--watch)}
  .b-ok{background:var(--ok-soft);color:var(--ok)} .b-ok .d{background:var(--ok)}
  .b-flag{background:var(--flag-soft);color:var(--flag)} .b-flag .d{background:var(--flag)}
  .b-none{background:var(--surface-2);color:var(--faint);border:1px dashed var(--line-strong)}
  .b-none .d{background:var(--faint)}
  .expsub{font-size:11px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums}
  .rowbtns{display:flex;gap:4px;justify-content:flex-end}
  .iconbtn{border:1px solid transparent;background:transparent;color:var(--muted);
    width:30px;height:30px;border-radius:7px;display:grid;place-items:center}
  .iconbtn:hover{background:var(--surface-2);border-color:var(--line);color:var(--ink)}
  .iconbtn svg{width:15px;height:15px}
  .iconbtn.set{color:var(--flag)}
  .tfoot{padding:11px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;
    display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
  .noresults{padding:48px 20px;text-align:center;color:var(--muted)}
  .noresults svg{width:34px;height:34px;color:var(--faint);margin-bottom:8px}

  /* ---- modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.46);backdrop-filter:blur(2px);
    z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;
    animation:pop .16s ease}
  @keyframes pop{from{transform:translateY(8px) scale(.99);opacity:0}to{transform:none;opacity:1}}
  .mh{display:flex;align-items:flex-start;gap:12px;padding:18px 20px 6px}
  .mh .ic{width:36px;height:36px;border-radius:9px;background:var(--primary-soft);color:var(--primary);
    display:grid;place-items:center;flex:none}
  .mh .ic svg{width:18px;height:18px}
  .mh h2{margin:0;font-size:16px;font-weight:640}
  .mh p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}
  .mh .x{margin-left:auto;color:var(--faint);background:none;border:none;font-size:20px;line-height:1;padding:2px 6px}
  .mh .x:hover{color:var(--ink)}
  .mbody{padding:14px 20px 4px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .matchbox{margin-top:8px;border:1px solid var(--soon-soft);background:var(--soon-soft);
    border-radius:8px;padding:9px 11px;font-size:12.5px;color:var(--soon)}
  .matchbox b{color:var(--ink)}
  .mfoot{display:flex;gap:9px;justify-content:flex-end;padding:14px 20px 18px;margin-top:6px}
  .seg{display:flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden;margin-bottom:14px}
  .seg button{flex:1;padding:9px;border:none;background:var(--surface);color:var(--muted);font-weight:560;font-size:13px}
  .seg button.on{background:var(--primary-soft);color:var(--primary-ink)}

  /* toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:540;
    box-shadow:var(--shadow-lg);opacity:0;transition:.22s;z-index:90;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:16px;height:16px;color:#7BE8B0}

  @media(max-width:980px){.stats{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:980px){.hide-md{display:none}}
  @media(max-width:620px){.stats{grid-template-columns:1fr 1fr}.bar{flex-wrap:wrap}}
</style>
</head>
<body>
<header class="app">
  <div class="bar">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
    </div>
    <div class="titles">
      <h1>Floor Supply Inventory</h1>
      <p>Long-term care · supply tracking</p>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost" id="resetBtn" title="Restore original imported data">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reset data
    </button>
    <button class="btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      New product
    </button>
    <button class="btn primary" id="receiveBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12l8.73-5.04M12 22V12"/></svg>
      Receive supply
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="panel" id="remPanel">
    <div class="ph" id="remHead">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
      <div>
        <h3>Expiry reminders</h3>
        <p id="remSummary">Build a reminder message for items expiring soon.</p>
      </div>
      <div class="chev"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
    </div>
    <div class="pb">
      <div class="rgrid">
        <div>
          <div class="field">
            <label>Flag items expiring within</label>
            <select id="remWindow">
              <option value="30">30 days</option>
              <option value="60">60 days</option>
              <option value="90" selected>90 days</option>
              <option value="180">180 days</option>
            </select>
          </div>
          <div class="field">
            <label>Send to (email, optional)</label>
            <input id="remTo" type="text" placeholder="charge.nurse@…">
          </div>
          <label class="chk"><input type="checkbox" id="remIncludeFlag" checked> Include "needs expiry date" items</label>
          <label class="chk"><input type="checkbox" id="remIncludeLow"> Include out-of-stock items</label>
        </div>
        <div class="msgbox">
          <div id="remBody"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search product or code…">
    </div>
    <select class="sel" id="locFilter"></select>
    <div class="chips" id="chips"></div>
  </div>

  <div class="tablewrap">
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th data-sort="name">Product <span class="arr"></span></th>
            <th data-sort="location" class="hide-md">Location <span class="arr"></span></th>
            <th data-sort="stock">On hand <span class="arr"></span></th>
            <th data-sort="expiry">Expiry status <span class="arr"></span></th>
            <th class="no-sort" style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="noResults" class="noresults" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <div>No items match these filters.</div>
    </div>
    <div class="tfoot">
      <span id="countLabel"></span>
      <span class="hide-md">Today: <b class="num" id="todayLabel"></b></span>
    </div>
  </div>
</main>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

const KEY = "ltc_floor_supply_v1";
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let items = [];
let nextId = 1;
let memCache = null;

/* ---------- storage (window.storage > localStorage > memory) ---------- */
const store = {
  async load(){
    try{ if(window.storage){ const r = await window.storage.get(KEY,false); if(r && r.value) return JSON.parse(r.value); } }catch(e){}
    try{ const v = localStorage.getItem(KEY); if(v) return JSON.parse(v); }catch(e){}
    return memCache;
  },
  async save(data){
    memCache = data;
    try{ if(window.storage){ await window.storage.set(KEY, JSON.stringify(data), false); return; } }catch(e){}
    try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
  }
};

/* ---------- state ---------- */
const ui = { search:"", loc:"all", status:"all", sortKey:"expiry", sortDir:1 };

/* ---------- helpers ---------- */
function parseD(s){ if(!s) return null; const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function daysUntil(s){ const d=parseD(s); if(!d) return null; return Math.round((d-TODAY)/86400000); }
function fmtD(s){ const d=parseD(s); if(!d) return s||""; return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }
function fmtFull(d){ return d.toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"}); }

function statusOf(it){
  if(it.expiry){
    const dd = daysUntil(it.expiry);
    if(dd===null) return {key:"none"};
    if(dd<0)  return {key:"expired", days:dd};
    if(dd<=30) return {key:"soon", days:dd};
    if(dd<=90) return {key:"watch", days:dd};
    return {key:"ok", days:dd};
  }
  return it.needsExpiry ? {key:"flag"} : {key:"none"};
}
const STATUS_META = {
  expired:{cls:"b-expired",edge:"var(--expired)",label:"Expired"},
  soon:{cls:"b-soon",edge:"var(--soon)",label:"Expiring"},
  watch:{cls:"b-watch",edge:"var(--watch)",label:"Watch"},
  ok:{cls:"b-ok",edge:"transparent",label:"In date"},
  flag:{cls:"b-flag",edge:"var(--flag)",label:"Needs date"},
  none:{cls:"b-none",edge:"transparent",label:"No expiry"}
};

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(msg){
  const t=document.getElementById("toast");
  t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'+esc(msg);
  t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- init ---------- */
async function init(){
  const saved = await store.load();
  if(saved && Array.isArray(saved) && saved.length){ items = saved; }
  else { items = SEED.map(x=>({...x})); }
  nextId = items.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
  document.getElementById("todayLabel").textContent = fmtFull(TODAY);
  buildLocations();
  renderAll();
}
function persist(){ store.save(items); }

function buildLocations(){
  const locs = [...new Set(items.map(i=>i.location).filter(Boolean))].sort();
  const sel = document.getElementById("locFilter");
  sel.innerHTML = '<option value="all">All locations</option>' + locs.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join("");
  sel.value = ui.loc;
}

/* ---------- counts ---------- */
function counts(){
  const c={all:items.length,expired:0,soon:0,watch:0,ok:0,flag:0,none:0,onhand:0,expiring90:0};
  for(const it of items){
    c.onhand += Number(it.stock)||0;
    const s=statusOf(it).key; c[s]++;
    if(s==="expired"||s==="soon"||s==="watch") c.expiring90++;
  }
  return c;
}

/* ---------- render stats ---------- */
function renderStats(){
  const c=counts();
  const cards=[
    {lab:"Products tracked",val:c.all,sub:c.onhand.toLocaleString()+" units on hand",edge:"var(--primary)",status:"all"},
    {lab:"Expiring ≤90 days",val:c.soon+c.watch,sub:"within the next 3 months",edge:"var(--soon)",status:"soon90"},
    {lab:"Expired",val:c.expired,sub:"remove or verify",edge:"var(--expired)",status:"expired"},
    {lab:"Needs expiry date",val:c.flag,sub:"flagged for review",edge:"var(--flag)",status:"flag"},
    {lab:"Out of stock",val:items.filter(i=>(Number(i.stock)||0)===0).length,sub:"reorder check",edge:"var(--muted)",status:"oos"}
  ];
  document.getElementById("stats").innerHTML = cards.map(k=>`
    <div class="stat clk ${ui.status===k.status?'active':''}" data-status="${k.status}">
      <div class="edge" style="background:${k.edge}"></div>
      <div class="lab">${k.lab}</div>
      <div class="val num">${k.val.toLocaleString()}</div>
      <div class="sub">${k.sub}</div>
    </div>`).join("");
  document.querySelectorAll(".stat.clk").forEach(el=>el.onclick=()=>{
    const s=el.dataset.status; ui.status = (ui.status===s?"all":s); renderAll();
  });
}

/* ---------- render chips ---------- */
function renderChips(){
  const c=counts();
  const defs=[
    {k:"all",label:"All",n:c.all},
    {k:"expired",label:"Expired",n:c.expired},
    {k:"soon",label:"≤30 days",n:c.soon},
    {k:"watch",label:"31–90 days",n:c.watch},
    {k:"flag",label:"Needs date",n:c.flag},
    {k:"none",label:"No expiry",n:c.none},
    {k:"ok",label:"In date",n:c.ok}
  ];
  document.getElementById("chips").innerHTML = defs.map(d=>`
    <button class="chip ${ui.status===d.k?'on':''}" data-k="${d.k}">${d.label}<span class="cnt num">${d.n}</span></button>`).join("");
  document.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{ ui.status=el.dataset.k; renderAll(); });
}

/* ---------- filtering ---------- */
function filtered(){
  let rows = items.slice();
  if(ui.loc!=="all") rows=rows.filter(r=>r.location===ui.loc);
  if(ui.search){
    const q=ui.search.toLowerCase();
    rows=rows.filter(r=>(r.name||"").toLowerCase().includes(q)||(r.code||"").toLowerCase().includes(q));
  }
  if(ui.status!=="all"){
    if(ui.status==="soon90") rows=rows.filter(r=>["soon","watch"].includes(statusOf(r).key));
    else if(ui.status==="oos") rows=rows.filter(r=>(Number(r.stock)||0)===0);
    else rows=rows.filter(r=>statusOf(r).key===ui.status);
  }
  const dir=ui.sortDir;
  rows.sort((a,b)=>{
    if(ui.sortKey==="expiry"){
      const da=daysUntil(a.expiry), db=daysUntil(b.expiry);
      const va=(da===null)?(a.needsExpiry?9e8:9e9):da;
      const vb=(db===null)?(b.needsExpiry?9e8:9e9):db;
      return (va-vb)*dir;
    }
    if(ui.sortKey==="stock") return ((Number(a.stock)||0)-(Number(b.stock)||0))*dir;
    const va=(a[ui.sortKey]||"").toString().toLowerCase(), vb=(b[ui.sortKey]||"").toString().toLowerCase();
    return va<vb?-1*dir:va>vb?1*dir:0;
  });
  return rows;
}

/* ---------- render table ---------- */
function renderTable(){
  const rows=filtered();
  const tb=document.getElementById("tbody");
  document.getElementById("noResults").style.display = rows.length?"none":"block";
  tb.innerHTML = rows.map(it=>{
    const s=statusOf(it); const m=STATUS_META[s.key];
    let badge, sub="";
    if(s.key==="expired"){ badge=`<span class="badge b-expired"><span class="d"></span>Expired</span>`; sub=`<div class="expsub">${fmtD(it.expiry)} · ${Math.abs(s.days)}d ago</div>`; }
    else if(s.key==="soon"){ badge=`<span class="badge b-soon"><span class="d"></span>${s.days}d left</span>`; sub=`<div class="expsub">${fmtD(it.expiry)}</div>`; }
    else if(s.key==="watch"){ badge=`<span class="badge b-watch"><span class="d"></span>${s.days}d left</span>`; sub=`<div class="expsub">${fmtD(it.expiry)}</div>`; }
    else if(s.key==="ok"){ badge=`<span class="badge b-ok"><span class="d"></span>In date</span>`; sub=`<div class="expsub">${fmtD(it.expiry)}</div>`; }
    else if(s.key==="flag"){ badge=`<span class="badge b-flag"><span class="d"></span>Needs date</span>`; }
    else { badge=`<span class="badge b-none"><span class="d"></span>No expiry</span>`; }
    const stock=Number(it.stock)||0;
    const noteHtml = it.note ? `<div class="expsub" title="${esc(it.note)}">⚑ ${esc(it.note.replace(/\n/g,' · '))}</div>` : "";
    return `<tr data-id="${it.id}">
      <td class="acc" style="border-left-color:${m.edge}">
        <div class="pname">${esc(it.name)||"<span style='color:var(--faint)'>Unnamed</span>"}</div>
        <div class="pcode">${esc(it.code)||"—"}</div>
      </td>
      <td class="hide-md"><span class="loc"><span class="dot"></span>${esc(it.location)||"—"}</span></td>
      <td><span class="stockcell num ${stock===0?'zero':''}">${stock.toLocaleString()}<span class="u">${esc(it.uom)}</span></span></td>
      <td>${badge}${sub}${noteHtml}</td>
      <td>
        <div class="rowbtns">
          <button class="iconbtn ${(!it.expiry)?'set':''}" data-act="exp" title="Set expiry date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </button>
          <button class="iconbtn" data-act="recv" title="Add received stock">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button class="iconbtn" data-act="edit" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>
          </button>
          <button class="iconbtn" data-act="del" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join("");
  tb.querySelectorAll("tr").forEach(tr=>{
    const id=+tr.dataset.id;
    tr.querySelectorAll("[data-act]").forEach(b=>b.onclick=(e)=>{
      e.stopPropagation();
      const act=b.dataset.act;
      if(act==="edit") openEdit(id);
      else if(act==="del") delItem(id);
      else if(act==="exp") openEdit(id,true);
      else if(act==="recv") openReceive(id);
    });
  });
  document.getElementById("countLabel").textContent =
    `${rows.length} of ${items.length} products` + (ui.loc!=="all"?` · ${ui.loc}`:"");
  // sort arrows
  document.querySelectorAll("thead th[data-sort]").forEach(th=>{
    const arr=th.querySelector(".arr");
    arr.textContent = (th.dataset.sort===ui.sortKey)?(ui.sortDir>0?"▲":"▼"):"";
  });
}

/* ---------- reminder ---------- */
function renderReminder(){
  const win = +document.getElementById("remWindow").value;
  const incFlag = document.getElementById("remIncludeFlag").checked;
  const incLow = document.getElementById("remIncludeLow").checked;

  const expired = items.filter(i=>{const d=daysUntil(i.expiry);return d!==null&&d<0;});
  const soon = items.filter(i=>{const d=daysUntil(i.expiry);return d!==null&&d>=0&&d<=win;});
  const flagged = incFlag? items.filter(i=>statusOf(i).key==="flag") : [];
  const oos = incLow? items.filter(i=>(Number(i.stock)||0)===0) : [];

  document.getElementById("remSummary").textContent =
    `${expired.length} expired · ${soon.length} expiring within ${win} days`+
    (flagged.length?` · ${flagged.length} missing a date`:"");

  const box=document.getElementById("remBody");
  if(!expired.length && !soon.length && !flagged.length && !oos.length){
    box.innerHTML = `<div class="empty-note">Nothing to flag in this window. Widen the window or include flagged items.</div>`;
    return;
  }
  const by = arr=>{
    const g={}; arr.forEach(i=>{(g[i.location]=g[i.location]||[]).push(i);});
    return Object.keys(g).sort().map(loc=>{
      const lines=g[loc].sort((a,b)=>(daysUntil(a.expiry)??1e9)-(daysUntil(b.expiry)??1e9))
        .map(i=>{
          const d=daysUntil(i.expiry);
          const when = i.expiry ? (d<0?`EXPIRED ${fmtD(i.expiry)}`:`${fmtD(i.expiry)} (${d}d)`) : "no date on file";
          return `   • ${i.name}${i.code?` [${i.code}]`:""} — ${i.stock} ${i.uom} — ${when}`;
        }).join("\n");
      return `${loc}\n${lines}`;
    }).join("\n\n");
  };
  let msg = `Supply expiry reminder — ${fmtFull(TODAY)}\n`;
  msg += `Long-term care floor supply\n`;
  msg += `${"=".repeat(46)}\n\n`;
  if(expired.length){ msg += `EXPIRED — remove / verify (${expired.length})\n${by(expired)}\n\n`; }
  if(soon.length){ msg += `EXPIRING WITHIN ${win} DAYS (${soon.length})\n${by(soon)}\n\n`; }
  if(flagged.length){
    msg += `MISSING EXPIRY DATE — please check label & update (${flagged.length})\n`;
    msg += flagged.slice(0,40).map(i=>`   • ${i.name}${i.code?` [${i.code}]`:""} — ${i.location}`).join("\n");
    if(flagged.length>40) msg+=`\n   …and ${flagged.length-40} more`;
    msg += `\n\n`;
  }
  if(oos.length){
    msg += `OUT OF STOCK — reorder check (${oos.length})\n`;
    msg += oos.slice(0,40).map(i=>`   • ${i.name}${i.code?` [${i.code}]`:""} — ${i.location}`).join("\n");
    if(oos.length>40) msg+=`\n   …and ${oos.length-40} more`;
    msg += `\n\n`;
  }
  msg += `Please action expired and soon-to-expire items first.`;

  box.innerHTML = `
    <textarea id="remText" readonly></textarea>
    <div class="msgrow">
      <button class="btn primary" id="remCopy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy message</button>
      <button class="btn" id="remMail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>Open in email</button>
    </div>`;
  document.getElementById("remText").value = msg;
  document.getElementById("remCopy").onclick = async ()=>{
    try{ await navigator.clipboard.writeText(msg); }catch(e){ const t=document.getElementById("remText"); t.removeAttribute("readonly"); t.select(); document.execCommand("copy"); t.setAttribute("readonly","true"); }
    toast("Reminder copied to clipboard");
  };
  document.getElementById("remMail").onclick = ()=>{
    const to=document.getElementById("remTo").value.trim();
    const subj=`Supply expiry reminder — ${expired.length} expired, ${soon.length} expiring soon`;
    window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(msg)}`;
  };
}

/* ---------- modals ---------- */
const overlay=document.getElementById("overlay"), modalEl=document.getElementById("modal");
function closeModal(){ overlay.classList.remove("show"); modalEl.innerHTML=""; }
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

function locationOptions(sel){
  const locs=[...new Set(items.map(i=>i.location).filter(Boolean))].sort();
  return locs.map(l=>`<option value="${esc(l)}" ${l===sel?"selected":""}>${esc(l)}</option>`).join("");
}

function openEdit(id, focusExp){
  const it=items.find(x=>x.id===id); if(!it) return;
  modalEl.innerHTML = `
    <div class="mh">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg></div>
      <div><h2>Edit product</h2><p>${esc(it.location)}</p></div>
      <button class="x" data-x>×</button>
    </div>
    <div class="mbody">
      <div class="field"><label>Product name</label><input id="f_name" value="${esc(it.name)}"></div>
      <div class="row2">
        <div class="field"><label>Code / SKU</label><input id="f_code" value="${esc(it.code)}"></div>
        <div class="field"><label>Unit (UOM)</label><input id="f_uom" value="${esc(it.uom)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>On hand</label><input id="f_stock" type="number" min="0" value="${Number(it.stock)||0}"></div>
        <div class="field"><label>Location</label><select id="f_loc">${locationOptions(it.location)}</select></div>
      </div>
      <div class="field"><label>Expiry date</label><input id="f_exp" type="date" value="${it.expiry||""}"></div>
      <label class="chk"><input type="checkbox" id="f_needs" ${it.needsExpiry?"checked":""}> This item needs an expiry date (flag for review)</label>
      <div class="field" style="margin-top:12px"><label>Note (optional)</label><input id="f_note" value="${esc(it.note)}" placeholder="e.g. mixed lots, partial cases"></div>
    </div>
    <div class="mfoot">
      <button class="btn" data-x>Cancel</button>
      <button class="btn primary" id="f_save">Save changes</button>
    </div>`;
  overlay.classList.add("show");
  modalEl.querySelectorAll("[data-x]").forEach(b=>b.onclick=closeModal);
  if(focusExp) setTimeout(()=>modalEl.querySelector("#f_exp").focus(),60);
  modalEl.querySelector("#f_save").onclick=()=>{
    it.name=modalEl.querySelector("#f_name").value.trim();
    it.code=modalEl.querySelector("#f_code").value.trim();
    it.uom=modalEl.querySelector("#f_uom").value.trim()||"EA";
    it.stock=Math.max(0,parseInt(modalEl.querySelector("#f_stock").value)||0);
    it.location=modalEl.querySelector("#f_loc").value;
    it.expiry=modalEl.querySelector("#f_exp").value||null;
    it.needsExpiry=modalEl.querySelector("#f_needs").checked;
    it.note=modalEl.querySelector("#f_note").value.trim();
    if(it.expiry) it.needsExpiry=false;
    persist(); buildLocations(); closeModal(); renderAll(); toast("Saved “"+(it.name||"product")+"”");
  };
}

function delItem(id){
  const it=items.find(x=>x.id===id); if(!it) return;
  modalEl.innerHTML=`
    <div class="mh">
      <div class="ic" style="background:var(--expired-soft);color:var(--expired)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></div>
      <div><h2>Delete product</h2><p>This cannot be undone.</p></div>
      <button class="x" data-x>×</button>
    </div>
    <div class="mbody"><p style="margin:4px 0 8px">Remove <b>${esc(it.name)||"this item"}</b> ${it.code?`(${esc(it.code)})`:""} from ${esc(it.location)}?</p></div>
    <div class="mfoot">
      <button class="btn" data-x>Keep it</button>
      <button class="btn" id="d_yes" style="background:var(--expired);border-color:var(--expired);color:#fff">Delete</button>
    </div>`;
  overlay.classList.add("show");
  modalEl.querySelectorAll("[data-x]").forEach(b=>b.onclick=closeModal);
  modalEl.querySelector("#d_yes").onclick=()=>{
    items=items.filter(x=>x.id!==id); persist(); buildLocations(); closeModal(); renderAll(); toast("Product deleted");
  };
}

function openReceive(presetId){
  const preset = presetId? items.find(x=>x.id===presetId) : null;
  let mode = preset? "existing":"existing";
  function body(){
    return `
    <div class="mh">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12l8.73-5.04M12 22V12"/></svg></div>
      <div><h2>Receive supply</h2><p>Log a delivery into inventory</p></div>
      <button class="x" data-x>×</button>
    </div>
    <div class="mbody">
      <div class="seg" id="seg">
        <button data-m="existing" class="${mode==='existing'?'on':''}">Add to existing</button>
        <button data-m="new" class="${mode==='new'?'on':''}">New product</button>
      </div>
      <div id="segbody"></div>
    </div>
    <div class="mfoot">
      <button class="btn" data-x>Cancel</button>
      <button class="btn primary" id="r_save">Receive</button>
    </div>`;
  }
  function existingForm(){
    const opts = items.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||""))
      .map(i=>`<option value="${i.id}" ${preset&&preset.id===i.id?"selected":""}>${esc(i.name)} ${i.code?`· ${esc(i.code)}`:""} · ${esc(i.location)} (${i.stock} ${esc(i.uom)})</option>`).join("");
    return `
      <div class="field"><label>Product</label><select id="r_prod">${opts}</select></div>
      <div class="row2">
        <div class="field"><label>Quantity received</label><input id="r_qty" type="number" min="1" value="1"></div>
        <div class="field"><label>New expiry (optional)</label><input id="r_exp" type="date"></div>
      </div>
      <div class="hint">Quantity is added to the current on-hand count. Setting an expiry updates the product and clears any "needs date" flag.</div>`;
  }
  function newForm(){
    return `
      <div class="field"><label>Product name</label><input id="n_name" placeholder="e.g. Normal Saline 0.9% 500mL"></div>
      <div class="row2">
        <div class="field"><label>Code / SKU</label><input id="n_code" placeholder="optional"></div>
        <div class="field"><label>Unit (UOM)</label><input id="n_uom" value="EA"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Quantity received</label><input id="n_qty" type="number" min="0" value="1"></div>
        <div class="field"><label>Location</label><select id="n_loc">${locationOptions(preset?preset.location:"")}</select></div>
      </div>
      <div class="field"><label>Expiry date (optional)</label><input id="n_exp" type="date"></div>
      <label class="chk"><input type="checkbox" id="n_needs"> Flag as needing an expiry date</label>`;
  }
  function paint(){
    modalEl.innerHTML=body();
    modalEl.querySelector("#segbody").innerHTML = mode==="existing"?existingForm():newForm();
    modalEl.querySelectorAll("[data-x]").forEach(b=>b.onclick=closeModal);
    modalEl.querySelectorAll("#seg button").forEach(b=>b.onclick=()=>{mode=b.dataset.m;paint();});
    modalEl.querySelector("#r_save").onclick=save;
  }
  function save(){
    if(mode==="existing"){
      const pid=+modalEl.querySelector("#r_prod").value;
      const it=items.find(x=>x.id===pid); if(!it) return;
      const qty=parseInt(modalEl.querySelector("#r_qty").value)||0;
      it.stock=(Number(it.stock)||0)+qty;
      const exp=modalEl.querySelector("#r_exp").value;
      if(exp){ it.expiry=exp; it.needsExpiry=false; }
      persist(); closeModal(); renderAll(); toast(`Received ${qty} ${it.uom} of ${it.name}`);
    } else {
      const name=modalEl.querySelector("#n_name").value.trim();
      if(!name){ toast("Enter a product name"); return; }
      const exp=modalEl.querySelector("#n_exp").value||null;
      const it={ id:nextId++, name,
        code:modalEl.querySelector("#n_code").value.trim(),
        uom:modalEl.querySelector("#n_uom").value.trim()||"EA",
        stock:Math.max(0,parseInt(modalEl.querySelector("#n_qty").value)||0),
        location:modalEl.querySelector("#n_loc").value,
        expiry:exp, needsExpiry: exp?false:modalEl.querySelector("#n_needs").checked, note:"" };
      items.push(it); persist(); buildLocations(); closeModal(); renderAll(); toast(`Added “${name}”`);
    }
  }
  paint(); overlay.classList.add("show");
}

/* ---------- wiring ---------- */
function renderAll(){ renderStats(); renderChips(); renderTable(); renderReminder(); }

document.getElementById("search").addEventListener("input",e=>{ ui.search=e.target.value; renderTable(); });
document.getElementById("locFilter").addEventListener("change",e=>{ ui.loc=e.target.value; renderAll(); });
document.querySelectorAll("thead th[data-sort]").forEach(th=>th.onclick=()=>{
  const k=th.dataset.sort;
  if(ui.sortKey===k) ui.sortDir*=-1; else { ui.sortKey=k; ui.sortDir=(k==="name"||k==="location")?1:1; }
  renderTable();
});
document.getElementById("receiveBtn").onclick=()=>openReceive();
document.getElementById("addBtn").onclick=()=>{ openReceive(); };
document.getElementById("resetBtn").onclick=()=>{
  modalEl.innerHTML=`
    <div class="mh"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
    <div><h2>Reset to imported data</h2><p>Discard all changes</p></div><button class="x" data-x>×</button></div>
    <div class="mbody"><p style="margin:4px 0 8px">This replaces the current inventory with the original ${SEED.length} products imported from the spreadsheet. Any edits, new products, expiry dates, and received stock will be lost.</p></div>
    <div class="mfoot"><button class="btn" data-x>Cancel</button><button class="btn" id="rs_yes" style="background:var(--expired);border-color:var(--expired);color:#fff">Reset everything</button></div>`;
  overlay.classList.add("show");
  modalEl.querySelectorAll("[data-x]").forEach(b=>b.onclick=closeModal);
  modalEl.querySelector("#rs_yes").onclick=()=>{
    items=SEED.map(x=>({...x})); nextId=items.reduce((m,x)=>Math.max(m,x.id||0),0)+1;
    persist(); buildLocations(); closeModal(); ui.status="all"; ui.loc="all"; ui.search="";
    document.getElementById("search").value=""; renderAll(); toast("Inventory reset");
  };
};

["remWindow","remIncludeFlag","remIncludeLow","remTo"].forEach(id=>{
  document.getElementById(id).addEventListener("change",renderReminder);
});
document.getElementById("remHead").onclick=()=>{
  document.getElementById("remPanel").classList.toggle("open");
};

init();
</script>
</body>
</html>
